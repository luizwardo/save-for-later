<!DOCTYPE html>
<html>

<head>
  <title>Save for Later</title>
  <link rel="stylesheet" type="text/css" href="settings.css">
</head>

<body>
  <div class="app-layout">
    <main class="main-content">
      <header class="content-header">
        <h1>Saved Links</h1>
      </header>
      <div class="content-body">
        <div id="all-links-grid" class="links-grid">
          <div class="empty-state">No links saved yet</div>
        </div>
      </div>
    </main>
  </div>

  <!-- Confirm Open & Delete Modal -->
  <div id="confirm-open-modal" class="modal">
    <div class="modal-content">
      <h3>Open Link</h3>
      <p style="color: var(--text-primary); margin: 0 0 24px 0; text-align: center; line-height: 1.5;">
        Are you sure? The link will be deleted once you open it.
      </p>
      <div class="modal-actions">
        <button id="cancel-open-btn" class="btn-secondary">Cancel</button>
        <button id="confirm-open-btn" class="btn-primary">Open &amp; Delete</button>
      </div>
    </div>
  </div>

  <script src="settings.js"></script>
</body>

</html>
